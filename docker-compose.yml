name: rinha-2026-clojure

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "20MB"

  api1:
    image: jutamagno/rinha-2026-clojure:latest
    environment:
      PORT: "3000"
      INDEX_PATH: "/data/index.bin"
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165MB"

  api2:
    image: jutamagno/rinha-2026-clojure:latest
    environment:
      PORT: "3000"
      INDEX_PATH: "/data/index.bin"
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165MB"

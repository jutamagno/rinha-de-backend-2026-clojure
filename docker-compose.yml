name: rinha-2026-clojure

services:
  haproxy:
    image: haproxy:3.0-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: "20MB"

  api1:
    image: tamagno/rinha-2026-clojure:latest
    environment:
      PORT: "3000"
      INDEX_PATH: "/data/index.bin"
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165MB"

  api2:
    image: tamagno/rinha-2026-clojure:latest
    environment:
      PORT: "3000"
      INDEX_PATH: "/data/index.bin"
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165MB"

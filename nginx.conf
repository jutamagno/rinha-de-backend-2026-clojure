worker_processes 1;

events {
    worker_connections 1024;
    use epoll;
}

http {
    access_log off;
    error_log /dev/null;

    upstream backend {
        server api1:3000;
        server api2:3000;
        keepalive 64;
    }

    server {
        listen 9999;

        location / {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_read_timeout 5s;
        }
    }
}
